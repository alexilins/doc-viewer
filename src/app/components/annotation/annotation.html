<div
  class="annotation"
  #wrapper
  [style.left.%]="annotation().positionX"
  [style.top.%]="annotation().positionY"
>
  <div class="annotation__content" (mousedown)="onMouseDown($event)">
    {{ annotation().content }}
  </div>

  <button class="annotation__delete" #closeControl matMiniFab (click)="onDelete()">
    <mat-icon>close</mat-icon>
  </button>
</div>
