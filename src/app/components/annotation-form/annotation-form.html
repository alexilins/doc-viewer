<form>
  <mat-dialog-content>
    <mat-form-field class="field">
      <mat-label>Текст аннотации</mat-label>
      <textarea matInput [formField]="form.content"></textarea>
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button type="button" matButton mat-dialog-close>Отмена</button>
    <button
      type="button"
      matButton
      [mat-dialog-close]="form.content().value()"
      [disabled]="form().invalid()"
    >
      Сохранить
    </button>
  </mat-dialog-actions>
</form>
