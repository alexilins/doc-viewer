@if (document.hasValue()) {
  <app-toolbar
    [document]="document.value()"
    [scaleFactor]="scaleFactor()"
    (save)="save()"
    (scale)="scale($event)"
  />
}

<div class="wrapper">
  <main class="pages-container" [style.width.%]="scaleStyleWidth()">
    @if (document.isLoading()) {
      <mat-spinner />
    } @else {
      @for (page of document.value()?.pages; track page.number) {
        <div class="page-wrapper">
          <img
            class="mat-shadow-2 page"
            [src]="page.imageUrl"
            alt=""
            loading="lazy"
            (click)="addAnnotation($event, page)"
          />

          @for (annotation of page.annotations; track annotation.id) {
            <app-annotation
              [annotation]="annotation"
              (delete)="deleteAnnotation(page, annotation)"
            />
          }
        </div>
      }
    }
  </main>
</div>
